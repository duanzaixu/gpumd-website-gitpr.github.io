<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPUMD - High-Precision Billion-Atom GPU Accelerated MD Simulation</title>
    <link rel="stylesheet" href="css/cover.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/cover.js"></script>
    <style>
        .mobile-lang-toggle {
            display: none;
        }
        @media (max-width: 768px) {
            .mobile-lang-toggle {
                display: flex;
                position: absolute;
                right: 1.5rem;
                top: 50%;
                transform: translateY(-50%);
                padding: 0.4rem 0.8rem;
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 99px;
                background: rgba(255, 255, 255, 0.1);
                color: white;
                font-size: 0.75rem;
                align-items: center;
                gap: 0.5rem;
                cursor: pointer;
                z-index: 101;
                backdrop-filter: blur(4px);
            }
        }
        /* Custom font size adjustments for English version */
        .slogan-title {
            font-size: clamp(1.8rem, 5vw, 4rem); /* Reduced from clamp(2rem, 6vw, 5rem) */
        }
        .slogan-subtitle {
            font-size: clamp(0.75rem, 1.5vw, 1.2rem); /* Reduced from clamp(0.875rem, 2vw, 1.5rem) */
            letter-spacing: 0.3rem; /* Adjusted spacing */
        }
        .explore-btn {
            font-size: clamp(0.875rem, 1.2vw, 1.125rem); /* Reduced from clamp(1rem, 1.5vw, 1.25rem) */
            padding: clamp(0.6rem, 1.2vh, 0.9rem) clamp(1.5rem, 3.5vw, 3rem);
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="bg-glow"></div>
        <div class="bg-grid-overlay"></div>
        <canvas id="particles-canvas"></canvas>
    </div>

    <header class="header">
        <a href="index_en.html" class="logo-container">
            <img src="images/logo.png" alt="GPUMD Logo" class="logo-img">
            <span class="logo-text">GPUMD</span>
        </a>
        <nav class="nav-links">
            <a href="home_en.html" class="nav-link">Home</a>
            <a href="download_en.html" class="nav-link">Download</a>
            <a href="database_en.html" class="nav-link">NEP Database</a>
            <a href="ecosystem_en.html" class="nav-link">Ecosystem</a>
            <a href="support_en.html" class="nav-link">About Us</a>
            <button class="lang-toggle" onclick="localStorage.setItem('language_preference', 'zh'); window.location.href='index.html'">
                <i data-lucide="globe"></i>
                EN / CN
            </button>
        </nav>
        <button class="mobile-lang-toggle" onclick="localStorage.setItem('language_preference', 'zh'); window.location.href='index.html'">
            <i data-lucide="globe" style="width: 14px; height: 14px;"></i>
            CN
        </button>
    </header>

    <main class="cover-container">
        <div class="slogan-box">
            <h1 class="slogan-title">High-Precision Billion-Atom<br>GPU Accelerated MD Simulation</h1>
            <p class="slogan-subtitle">Redefining Atomistic Simulation</p>
            <div style="display: flex; justify-content: center;">
                <button class="explore-btn" onclick="window.location.href='home_en.html'">
                    Explore Now
                </button>
            </div>
        </div>

        <div class="scroll-indicator">
            <div class="mouse">
                <div class="wheel"></div>
            </div>
            <span class="scroll-text">Scroll Down</span>
        </div>
    </main>

    <div class="transition-overlay" id="overlay"></div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>GPUMD - 高精度亿原子级GPU加速分子动力学模拟</title>
    <link rel="stylesheet" href="css/cover.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/cover.js"></script>
    <script>
        (function() {
            // Check if user has explicitly set a preference
            var lang = localStorage.getItem('language_preference');
            // If no preference, detect browser language
            if (!lang) {
                var userLang = navigator.language || navigator.userLanguage;
                if (userLang.toLowerCase().indexOf('en') === 0) {
                    window.location.href = 'index_en.html';
                }
            }
        })();
    </script>
    <style>
        .mobile-lang-toggle {
            display: none;
        }
        @media (max-width: 768px) {
            .mobile-lang-toggle {
                display: flex;
                position: absolute;
                right: 1.5rem;
                top: 50%;
                transform: translateY(-50%);
                padding: 0.4rem 0.8rem;
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 99px;
                background: rgba(255, 255, 255, 0.1);
                color: white;
                font-size: 0.75rem;
                align-items: center;
                gap: 0.5rem;
                cursor: pointer;
                z-index: 101;
                backdrop-filter: blur(4px);
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="bg-glow"></div>
        <div class="bg-grid-overlay"></div>
        <canvas id="particles-canvas"></canvas>
    </div>

    <header class="header">
        <a href="index.html" class="logo-container">
            <img src="images/logo.png" alt="GPUMD Logo" class="logo-img">
            <span class="logo-text">GPUMD</span>
        </a>
        <nav class="nav-links">
            <a href="home.html" class="nav-link">首页</a>
            <a href="download.html" class="nav-link">软件下载</a>
            <a href="database.html" class="nav-link">NEP势函数库</a>
            <a href="ecosystem.html" class="nav-link">社区生态</a>
            <a href="support.html" class="nav-link">关于我们</a>
            <button class="lang-toggle" onclick="localStorage.setItem('language_preference', 'en'); window.location.href='index_en.html'">
                <i data-lucide="globe"></i>
                CN / EN
            </button>
        </nav>
        <button class="mobile-lang-toggle" onclick="localStorage.setItem('language_preference', 'en'); window.location.href='index_en.html'">
            <i data-lucide="globe" style="width: 14px; height: 14px;"></i>
            EN
        </button>
    </header>

    <main class="cover-container">
        <div class="slogan-box">
            <h1 class="slogan-title">高精度 亿原子级<br>GPU 加速分子动力学模拟</h1>

            <div style="display: flex; justify-content: center;">
                <button class="explore-btn">
                    立即探索
                </button>
            </div>
        </div>

        <div class="scroll-indicator">
            <div class="mouse">
                <div class="wheel"></div>
            </div>
            <span class="scroll-text">向下滚动开启</span>
        </div>
    </main>

    <div class="transition-overlay" id="overlay"></div>
</body>
</html>
